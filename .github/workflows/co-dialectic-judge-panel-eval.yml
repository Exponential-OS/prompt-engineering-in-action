name: co-dialectic-judge-panel-eval

# Auto-triggers when judge panel logic or eval corpus changes.
# Also manually triggerable: Actions tab → co-dialectic-judge-panel-eval → Run workflow.
#
# HACK: Google auth uses a bearer token captured at push time by
# cyborg/scripts/git-push-token-refresh.py and written to the
# GOOGLE_BEARER_TOKEN GitHub Secret. Token TTL ~1 hour; CI runs in
# ~2-5 min — always fresh. Bills to the developer's Google AI Pro
# subscription, not the Gemini API (pay-per-token).
#
# TODO (when ready to go keyless): replace with GitHub OIDC + GCP
# Workload Identity Federation. Delete GOOGLE_BEARER_TOKEN secret,
# delete cyborg/scripts/git-push-token-refresh.py, and the SessionStart
# check-oauth.py hook. See git history for the WIF scaffold.

on:
  push:
    paths:
      - 'plugins/co-dialectic/skills/judge-panel/**'
      - 'plugins/co-dialectic/tests/**'
      - '.github/workflows/co-dialectic-judge-panel-eval.yml'
  pull_request:
    paths:
      - 'plugins/co-dialectic/skills/judge-panel/**'
      - 'plugins/co-dialectic/tests/**'
      - '.github/workflows/co-dialectic-judge-panel-eval.yml'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Judge panel eval (8-case seeded-flaw corpus)
        run: python3 plugins/co-dialectic/tests/judge_panel_eval.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # HACK: bearer token written by git-push-token-refresh.py at push time.
          # Bills to Google AI Pro subscription (not API). Delete when WIF is set up.
          GOOGLE_BEARER_TOKEN: ${{ secrets.GOOGLE_BEARER_TOKEN }}
          # Fallback if bearer token not set (API billing, pay-per-token).
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUDGE_PANEL_API_FALLBACK_APPROVED: "1"
          # CI uses flash for tiebreaker (pro times out >120s in headless env)
          # and a shorter per-call timeout to fail fast rather than hang.
          GEMINI_CLI_PREMIUM_MODEL: "gemini-3.1-flash-lite-preview"
          JUDGE_PANEL_TIMEOUT_S: "30"
